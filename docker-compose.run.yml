services:
  postgres:
    image: postgres:16-alpine
    container_name: zenseo-postgres
    environment:
      POSTGRES_DB: zenseo
      POSTGRES_USER: rahman
      POSTGRES_PASSWORD: zenseo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rahman -d zenseo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zenseo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    platform: linux/amd64
    image: ghcr.io/devrahmanbd/seoengine-backend:latest
    container_name: zenseo-backend
    environment:
      DATABASE_URL: postgresql://rahman:zenseo123@postgres:5432/zenseo
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-zenseo-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    platform: linux/amd64
    image: ghcr.io/devrahmanbd/seoengine-frontend:latest
    container_name: zenseo-frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
