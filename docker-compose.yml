services:
  postgres:
    image: postgres:16-alpine
    container_name: zenseo-postgres
    environment:
      POSTGRES_DB: zenseo
      POSTGRES_USER: rahman
      POSTGRES_PASSWORD: zenseo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rahman -d zenseo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zenseo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zenseo-backend
    environment:
      DATABASE_URL: postgresql://rahman:zenseo123@zenseo-postgres:5432/zenseo
      REDIS_URL: redis://zenseo-redis:6379
      SECRET_KEY: ${SECRET_KEY:-zenseo-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; exit(0) if urllib.request.urlopen(\"http://localhost:8000/health\").status == 200 else exit(1)'"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zenseo-frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data: