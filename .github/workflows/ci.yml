name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zenseo
          POSTGRES_USER: rahman
          POSTGRES_PASSWORD: zenseo123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U rahman -d zenseo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install Python deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run core tests
        run: |
          cd backend
          PYTHONPATH=. SECRET_KEY=ci-test-key \
            python -m pytest \
            tests/test_core/ \
            tests/test_executor/ \
            tests/test_atropos/test_base_env.py \
            tests/test_atropos/test_scored_data_api.py \
            tests/test_semantic/test_embeddings.py \
            tests/test_learning/test_reward_calculator.py \
            tests/test_growth/test_growth_api.py \
            -v --tb=short
        env:
          DATABASE_URL: postgresql://rahman:zenseo123@localhost:5432/zenseo

  build-and-push:
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
            context: backend
            push: true
            tags: ${{ steps.meta-backend.outputs.tags }}
            labels: ${{ steps.meta-backend.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: admin
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
